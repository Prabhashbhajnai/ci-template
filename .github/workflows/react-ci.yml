#.github/workflows/react-build.yml

name: React Build

on:
    workflow_call:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
            - run: npm ci
            - run: npm run build --if-present
